# ============================================================
# AI 智能投标系统 · 本地开发基础设施（Docker Compose）
# Story: S0-002
# 包含：PostgreSQL 15 + Redis 7 + Elasticsearch 8.x(IK) + MinIO + Milvus 2.4(standalone)
# 使用方式：docker compose -f docker-compose.dev.yml up -d
# ============================================================

services:
  # ----------------------------------------------------------
  # PostgreSQL 15 — 业务关系数据库
  # ----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: bidai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bidai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bidai_dev_pass}
      POSTGRES_DB: ${POSTGRES_DB:-bidai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - bidai-dev

  # ----------------------------------------------------------
  # Redis 7 — 缓存 / 消息队列 / Session
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: bidai-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-bidai_redis_pass}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-bidai_redis_pass}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - bidai-dev

  # ----------------------------------------------------------
  # Elasticsearch 8.x + IK 中文分词器 — 全文检索
  # ----------------------------------------------------------
  elasticsearch:
    build:
      context: ./elasticsearch
      dockerfile: Dockerfile
    container_name: bidai-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.routing.allocation.disk.threshold_enabled=false
      - indices.breaker.fielddata.limit=60%
      - indices.breaker.request.limit=40%
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "${ES_PORT:-9200}:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health | grep -E '(green|yellow)' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - bidai-dev

  # ----------------------------------------------------------
  # MinIO — 项目对象存储（原始文件/导出文件/知识库文档/审计日志）
  # ----------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-04-18T19-09-19Z
    container_name: bidai-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - bidai-dev

  # ----------------------------------------------------------
  # MinIO Init — 自动创建项目所需 Bucket（只读私有）
  # ----------------------------------------------------------
  minio-init:
    image: minio/mc:RELEASE.2024-04-18T16-45-29Z
    container_name: bidai-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      /usr/bin/mc config host add bidai http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      /usr/bin/mc mb bidai/bid-raw-files    || true;
      /usr/bin/mc mb bidai/bid-exports      || true;
      /usr/bin/mc mb bidai/kb-documents     || true;
      /usr/bin/mc mb bidai/audit-logs       || true;
      /usr/bin/mc anonymous set private bidai/bid-raw-files;
      /usr/bin/mc anonymous set private bidai/bid-exports;
      /usr/bin/mc anonymous set private bidai/kb-documents;
      /usr/bin/mc anonymous set private bidai/audit-logs;
      echo 'MinIO buckets initialized successfully';
      exit 0;
      "
    networks:
      - bidai-dev

  # ----------------------------------------------------------
  # Milvus 依赖：etcd — 服务发现与元数据存储
  # ----------------------------------------------------------
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: bidai-etcd
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: >
      etcd
      -advertise-client-urls http://127.0.0.1:2379
      -listen-client-urls http://0.0.0.0:2379
      --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - bidai-dev

  # ----------------------------------------------------------
  # Milvus 依赖：minio — Milvus 内部对象存储
  # （与项目 MinIO 分离，避免相互影响）
  # ----------------------------------------------------------
  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: bidai-milvus-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - milvus_minio_data:/minio_data
    command: minio server /minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - bidai-dev

  # ----------------------------------------------------------
  # Milvus 2.4 Standalone — 向量数据库
  # ----------------------------------------------------------
  milvus-standalone:
    image: milvusdb/milvus:v2.4.5
    container_name: bidai-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "9091:9091"
    depends_on:
      etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 60s
    networks:
      - bidai-dev

# ============================================================
# 持久化卷声明
# ============================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  es_data:
    driver: local
  minio_data:
    driver: local
  etcd_data:
    driver: local
  milvus_minio_data:
    driver: local
  milvus_data:
    driver: local

# ============================================================
# 网络
# ============================================================
networks:
  bidai-dev:
    driver: bridge
    name: bidai-dev
