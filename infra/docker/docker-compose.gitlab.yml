# ============================================================
# GitLab CE + GitLab Runner — CI/CD 基础设施
# Story: S0-003
# 包含：GitLab CE (Omnibus) + GitLab Runner (Docker executor)
# 使用方式：docker compose -f docker-compose.gitlab.yml up -d
# ============================================================

services:
  # ----------------------------------------------------------
  # GitLab CE — 代码托管 + CI/CD 编排
  # ----------------------------------------------------------
  gitlab:
    image: gitlab/gitlab-ce:17.11.0-ce.0
    container_name: bidai-gitlab
    restart: unless-stopped
    hostname: gitlab.local
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://localhost'
        nginx['listen_port'] = 80
        gitlab_rails['gitlab_shell_ssh_port'] = 2222
        # 外部 PostgreSQL（复用 dev 环境数据库，节省内存）
        postgresql['enable'] = false
        gitlab_rails['db_adapter'] = "postgresql"
        gitlab_rails['db_encoding'] = "unicode"
        gitlab_rails['db_host'] = "bidai-postgres"
        gitlab_rails['db_port'] = 5432
        gitlab_rails['db_database'] = "gitlabhq_production"
        gitlab_rails['db_username'] = "gitlab"
        gitlab_rails['db_password'] = "gitlab_dev_pass"
        # 外部 Redis（复用 dev 环境 Redis，节省内存）
        redis['enable'] = false
        gitlab_rails['redis_host'] = "bidai-redis"
        gitlab_rails['redis_port'] = 6379
        gitlab_rails['redis_password'] = "bidai_redis_pass"
        # 禁用 Prometheus 以节省内存
        prometheus['enable'] = false
        alertmanager['enable'] = false
        node_exporter['enable'] = false
        redis_exporter['enable'] = false
        postgres_exporter['enable'] = false
        gitlab_exporter['enable'] = false
        # 降低 Puma worker 数量以节省内存
        puma['worker_processes'] = 2
        puma['min_threads'] = 1
        puma['max_threads'] = 4
        # 降低 Sidekiq 并发
        sidekiq['concurrency'] = 10
        # 关闭部分非必要功能
        mattermost['enable'] = false
        registry['enable'] = false
        # 备份目录
        gitlab_rails['backup_path'] = "/var/opt/gitlab/backups"
        # 初始 root 密码（首次启动后建议修改）
        gitlab_rails['initial_root_password'] = "BidAI_GitLab_2026"
    ports:
      - "8088:80"
      - "8443:443"
      - "2222:22"
    volumes:
      - gitlab_config:/etc/gitlab
      - gitlab_logs:/var/log/gitlab
      - gitlab_data:/var/opt/gitlab
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G
    networks:
      - bidai-dev
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:80/-/health"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 120s

  # ----------------------------------------------------------
  # GitLab Runner — CI 执行器（Docker executor）
  # ----------------------------------------------------------
  gitlab-runner:
    image: gitlab/gitlab-runner:alpine-v17.11.0
    container_name: bidai-gitlab-runner
    restart: unless-stopped
    volumes:
      - gitlab_runner_config:/etc/gitlab-runner
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - bidai-dev
    depends_on:
      gitlab:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

# ============================================================
# 持久化卷声明
# ============================================================
volumes:
  gitlab_config:
    driver: local
  gitlab_logs:
    driver: local
  gitlab_data:
    driver: local
  gitlab_runner_config:
    driver: local

# ============================================================
# 网络（复用 dev 环境的桥接网络，使 GitLab 可访问 PG/Redis）
# ============================================================
networks:
  bidai-dev:
    external: true
