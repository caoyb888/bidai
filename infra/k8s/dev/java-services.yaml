# ============================================================
# Java 业务服务层 — 开发环境 Deployment + Service
# 服务：auth / project / export / notify
# ============================================================

# ---------- auth-service ----------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: bid-ai-dev
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: app
          image: bidai/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: http
          envFrom:
            - configMapRef:
                name: bidai-shared-config
            - secretRef:
                name: bidai-shared-secrets
          env:
            - name: SERVICE_NAME
              value: "auth-service"
            - name: OTEL_SERVICE_NAME
              value: "auth-service"
            - name: SERVER_PORT
              value: "8081"
            - name: SPRING_PROFILES_ACTIVE
              value: "development"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: bid-ai-dev
spec:
  selector:
    app: auth-service
  ports:
    - port: 80
      targetPort: 8081
      name: http
  type: ClusterIP

