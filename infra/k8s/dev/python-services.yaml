# ============================================================
# Python AI 能力层服务 — 开发环境 Deployment + Service
# 服务：bid-parser / bid-writer / bid-review / collusion-analysis / knowledge / win-rate
# ============================================================

# ---------- bid-parser-service ----------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bid-parser-service
  namespace: bid-ai-dev
  labels:
    app: bid-parser-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bid-parser-service
  template:
    metadata:
      labels:
        app: bid-parser-service
    spec:
      containers:
        - name: app
          image: bidai/bid-parser-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: bidai-shared-config
            - secretRef:
                name: bidai-shared-secrets
          env:
            - name: SERVICE_NAME
              value: "bid-parser-service"
            - name: OTEL_SERVICE_NAME
              value: "bid-parser-service"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: bid-parser-service
  namespace: bid-ai-dev
spec:
  selector:
    app: bid-parser-service
  ports:
    - port: 80
      targetPort: 8000
      name: http
  type: ClusterIP

