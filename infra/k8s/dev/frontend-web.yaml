# ============================================================
# Web 前端 — 开发环境 Deployment + Service
# 基于 nginx 托管 Vite 构建产物
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bid-web
  namespace: bid-ai-dev
  labels:
    app: bid-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bid-web
  template:
    metadata:
      labels:
        app: bid-web
    spec:
      containers:
        - name: nginx
          image: bidai/bid-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          env:
            - name: VITE_API_BASE_URL
              value: "/api/v1"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: bid-web
  namespace: bid-ai-dev
spec:
  selector:
    app: bid-web
  ports:
    - port: 80
      targetPort: 80
      name: http
  type: ClusterIP
