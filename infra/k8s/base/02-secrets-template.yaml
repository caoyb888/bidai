# ============================================================
# 开发环境 Secret 模板
# ⚠️  本文件仅含占位符，真实 Secret 值不得提交到 Git！
#
# 使用方式：
#   1. 将本文件复制为 02-secrets.yaml（已加入 .gitignore）
#   2. 联系 OPS 获取各密钥的真实值
#   3. 运行 scripts/generate-k8s-secrets.sh 自动生成 Base64 编码的 Secret
#   3. kubectl apply -f infra/k8s/base/02-secrets.yaml
#
# 管理规范（Tech Spec §14）：
#   - 普通配置  → ConfigMap
#   - 敏感配置  → K8s Secret（Base64 编码）
#   - 超敏感配置 → HashiCorp Vault（K8s Secret 仅存引用）
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: bidai-shared-secrets
  namespace: bid-ai-dev
  labels:
    app: bidai-shared
type: Opaque
stringData:
  # 数据库密码
  DATABASE_PASSWORD: "<PLACEHOLDER>"

  # MinIO 密钥
  MINIO_ACCESS_KEY: "<PLACEHOLDER>"
  MINIO_SECRET_KEY: "<PLACEHOLDER>"

  # JWT 密钥
  JWT_SECRET_KEY: "<PLACEHOLDER>"

  # 加密主密钥（AES-256-GCM）
  ENCRYPTION_KEY: "<PLACEHOLDER>"

  # LLM 外部 API 密钥（降级用）
  LLM_EXTERNAL_API_KEY: "<PLACEHOLDER>"
