server:
  port: 8082

spring:
  application:
    name: project-service
  profiles:
    active: development
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/bidai?currentSchema=project}
    username: ${POSTGRES_USER:bidai}
    password: ${POSTGRES_PASSWORD:bidai_dev_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: project
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: project
    schemas: project
    baseline-on-migrate: true

app:
  jwt:
    secret: ${JWT_SECRET_KEY:dev-secret-key-change-in-production}
    issuer: bidai-auth-service
  auth-service:
    url: ${AUTH_SERVICE_URL:http://localhost:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.bidai: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
