server:
  port: 8083

spring:
  application:
    name: export-service
  profiles:
    active: development
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/bidai?currentSchema=auth}
    username: ${POSTGRES_USER:bidai}
    password: ${POSTGRES_PASSWORD:bidai_dev_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.bidai: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
