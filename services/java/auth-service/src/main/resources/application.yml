server:
  port: 8081

spring:
  application:
    name: auth-service
  profiles:
    active: development
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/bidai?currentSchema=auth}
    username: ${POSTGRES_USER:bidai}
    password: ${POSTGRES_PASSWORD:bidai_dev_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: auth
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: auth
    schemas: auth
    baseline-on-migrate: true

app:
  jwt:
    secret: ${JWT_SECRET_KEY:dev-secret-key-change-in-production}
    access-expiration-hours: 8
    refresh-expiration-days: 30
    issuer: bidai-auth-service
  security:
    max-login-failures: 5
    lock-duration-minutes: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.bidai: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
