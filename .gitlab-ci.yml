# ============================================================
# GitLab CI 基础流水线 — AI 智能投标系统
# Story: S0-003
# 目标：push 代码自动触发 CI，lint/test/build 三阶段可运行
# ============================================================

stages:
  - lint
  - test
  - build

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  GIT_DEPTH: 10

# ----------------------------------------------------------
# Workflow 规则：控制 Pipeline 触发
# ----------------------------------------------------------
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ==========================================================
# 通用模板（隐藏 Job，以 . 开头）
# ==========================================================

# ---------- Python 服务模板 ----------
.python-lint-template:
  stage: lint
  image: python:3.11-slim
  before_script:
    - pip install --no-cache-dir poetry==1.8.2
    - cd services/python/${SERVICE_NAME}
    - poetry config virtualenvs.in-project true
    - poetry install --no-root
  script:
    - poetry run black --check app/ tests/
    - poetry run ruff check app/ tests/
    - poetry run mypy app/

.python-test-template:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install --no-cache-dir poetry==1.8.2
    - cd services/python/${SERVICE_NAME}
    - poetry config virtualenvs.in-project true
    - poetry install --no-root
  script:
    - poetry run pytest tests/ -v --cov=app --cov-report=term-missing
  coverage: '/TOTAL.*\s+(\d+%)$/'

.python-build-template:
  stage: build
  image: docker:24-cli
  services:
    - docker:24-dind
  script:
    - docker build -t bidai/${SERVICE_NAME}:ci-${CI_COMMIT_SHORT_SHA} .
    - echo "✅ ${SERVICE_NAME} image built"

# ---------- Java 服务占位模板 ----------
.java-lint-template:
  stage: lint
  image: gradle:8-jdk21-alpine
  script:
    - |
      if [ -d "services/java/${SERVICE_NAME}" ]; then
        cd services/java/${SERVICE_NAME}
        ./gradlew check --no-daemon
      else
        echo "⚠️ services/java/${SERVICE_NAME} not ready yet (S0-005), skipping lint"
      fi

.java-test-template:
  stage: test
  image: gradle:8-jdk21-alpine
  script:
    - |
      if [ -d "services/java/${SERVICE_NAME}" ]; then
        cd services/java/${SERVICE_NAME}
        ./gradlew test --no-daemon
      else
        echo "⚠️ services/java/${SERVICE_NAME} not ready yet (S0-005), skipping test"
      fi

.java-build-template:
  stage: build
  image: docker:24-cli
  services:
    - docker:24-dind
  script:
    - |
      if [ -d "services/java/${SERVICE_NAME}" ]; then
        cd services/java/${SERVICE_NAME}
        docker build -t bidai/${SERVICE_NAME}:ci-${CI_COMMIT_SHORT_SHA} .
        echo "✅ ${SERVICE_NAME} image built"
      else
        echo "⚠️ services/java/${SERVICE_NAME} not ready yet (S0-005), skipping build"
      fi

# ---------- 前端占位模板 ----------
.frontend-lint-template:
  stage: lint
  image: node:20-alpine
  script:
    - |
      if [ -d "frontend/${PROJECT_NAME}" ]; then
        cd frontend/${PROJECT_NAME}
        if [ -f "pnpm-lock.yaml" ]; then
          npm install -g pnpm
          pnpm install --frozen-lockfile
          pnpm type-check
          pnpm lint
        else
          npm ci
          npm run type-check
          npm run lint
        fi
      else
        echo "⚠️ frontend/${PROJECT_NAME} not ready yet (S0-006), skipping lint"
      fi

.frontend-test-template:
  stage: test
  image: node:20-alpine
  script:
    - |
      if [ -d "frontend/${PROJECT_NAME}" ]; then
        cd frontend/${PROJECT_NAME}
        if [ -f "pnpm-lock.yaml" ]; then
          npm install -g pnpm
          pnpm install --frozen-lockfile
          pnpm type-check
        else
          npm ci
          npm run type-check
        fi
      else
        echo "⚠️ frontend/${PROJECT_NAME} not ready yet (S0-006), skipping test"
      fi

.frontend-build-template:
  stage: build
  image: node:20-alpine
  script:
    - |
      if [ -d "frontend/${PROJECT_NAME}" ]; then
        cd frontend/${PROJECT_NAME}
        if [ -f "pnpm-lock.yaml" ]; then
          npm install -g pnpm
          pnpm install --frozen-lockfile
          pnpm build
        else
          npm ci
          npm run build
        fi
        echo "✅ ${PROJECT_NAME} built"
      else
        echo "⚠️ frontend/${PROJECT_NAME} not ready yet (S0-006), skipping build"
      fi

# ==========================================================
# Lint 阶段
# ==========================================================

lint:commit-msg:
  stage: lint
  image: alpine:latest
  script:
    - apk add --no-cache bash
    - |
      echo "Checking commit message template and hooks..."
      test -f .gitmessage || exit 1
      test -f .githooks/commit-msg || exit 1
      test -x .githooks/commit-msg || exit 1
      echo "✅ Commit convention tools present"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

lint:docker-compose:
  stage: lint
  image: docker:24-cli
  services:
    - docker:24-dind
  script:
    - |
      echo "Linting Docker Compose files..."
      docker compose -f infra/docker/docker-compose.dev.yml config > /dev/null
      docker compose -f infra/docker/docker-compose.gitlab.yml config > /dev/null
      echo "✅ Docker Compose syntax valid"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
      changes:
        - infra/docker/*.yml
        - infra/docker/**/*.yml

lint:k8s-manifests:
  stage: lint
  image: alpine:latest
  before_script:
    - apk add --no-cache python3 py3-yaml
  script:
    - |
      echo "Validating K8s YAML manifests..."
      find infra/k8s -name '*.yaml' | while read f; do
        python3 -c "import yaml; list(yaml.safe_load_all(open('$f')))" || { echo "❌ Invalid YAML: $f"; exit 1; }
      done
      echo "✅ All K8s manifests are valid YAML"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
      changes:
        - infra/k8s/**
        - infra/nginx/**

test:db-migration:
  stage: test
  image: python:3.11-slim
  services:
    - postgres:15-alpine
  variables:
    POSTGRES_DB: bidai_test
    POSTGRES_USER: bidai
    POSTGRES_PASSWORD: bidai_test_pass
    DATABASE_URL: postgresql+psycopg2://bidai:bidai_test_pass@postgres:5432/bidai_test
  before_script:
    - pip install --no-cache-dir alembic psycopg2-binary sqlparse
    - |
      echo "Waiting for PostgreSQL..."
      for i in $(seq 1 30); do
        pg_isready -h postgres -p 5432 -U bidai && break
        sleep 1
      done
  script:
    - |
      cd infra/db
      export SQLALCHEMY_URL="$DATABASE_URL"
      sed -i "s|sqlalchemy.url = .*|sqlalchemy.url = $DATABASE_URL|" alembic.ini
      alembic upgrade head
      echo "✅ Alembic migration applied successfully"
      # Verify schema count
      schema_count=$(psql "$DATABASE_URL" -t -c "SELECT COUNT(*) FROM information_schema.schemata WHERE schema_name IN ('auth','project','knowledge','bid','ai_task','audit');")
      echo "Schema count: $schema_count"
      test "$schema_count" -eq 6 || exit 1
      echo "✅ All 6 schemas created"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
      changes:
        - infra/db/**
        - docs/database-design.md

lint:docs:
  stage: lint
  image: alpine:latest
  script:
    - |
      echo "Checking documentation files..."
      test -f docs/AI智能投标系统技术方案.md || exit 1
      test -f docs/API_Spec_BidAI_v1.0.md || exit 1
      test -f docs/database-design.md || exit 1
      test -f docs/Sprint_Plan_BidAI_v1.0.md || exit 1
      test -f CLAUDE.md || exit 1
      echo "✅ Core documentation present"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
      changes:
        - docs/**
        - CLAUDE.md

