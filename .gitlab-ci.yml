test:project-structure:
  stage: test
  image: alpine:latest
  script:
    - |
      echo "Validating project structure per CLAUDE.md..."
      test -f CLAUDE.md || exit 1
      test -f .gitignore || exit 1
      test -d infra/docker || exit 1
      test -d infra/k8s || exit 1
      test -d infra/db || exit 1
      test -d docs || exit 1
      test -f .gitmessage || exit 1
      test -d .githooks || exit 1
      # Python 服务必须存在
      test -d services/python/bid-parser-service || exit 1
      test -d services/python/bid-writer-service || exit 1
      test -d services/python/bid-review-service || exit 1
      test -d services/python/collusion-analysis-service || exit 1
      test -d services/python/knowledge-service || exit 1
      test -d services/python/win-rate-service || exit 1
      # Java 服务必须存在
      test -d services/java/auth-service || exit 1
      test -d services/java/project-service || exit 1
      test -d services/java/export-service || exit 1
      test -d services/java/notify-service || exit 1
      # 前端必须存在
      test -d frontend/bid-web || exit 1
      echo "✅ Project structure validation passed"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

